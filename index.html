<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Invitation</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Cinzel', serif;
      background: linear-gradient(to bottom, #fff8e7, #ffe4c4);
      color: #5a2d0c;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
    }

    .card {
      background: #fffaf0;
      border: 3px solid #d4af37;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
      margin-bottom: 10px;
      color: #b8860b;
    }

    h2 {
      margin: 10px 0;
      font-size: 24px;
    }

    .names {
      font-size: 32px;
      margin: 20px 0;
      font-weight: bold;
    }

    .details {
      margin-top: 20px;
      line-height: 1.8;
      font-size: 18px;
    }

    .footer {
      margin-top: 30px;
      font-size: 16px;
      color: #8b4513;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .flower {
      font-size: 30px;
      margin-bottom: 10px;
    }

  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <div class="flower">🌸 🌼 🌸</div>
      <h1>Wedding Invitation</h1>
      <h2>With the blessings of our families</h2>

      <div class="names">
        Akarsh <br> ❤️ <br> Mrudula
      </div>

      <div class="details">
        <p><strong>Date:</strong> 4th May 2026</p>
        <p><strong>Time:</strong> 6:30 AM onwards</p>
        <p><strong>Venue:</strong> Temple / Wedding Hall Name, City</p>
      </div>

      <div class="footer">
        We request the honor of your presence to bless the couple.
      </div>
    </div>
  </div>

</body>
</html>
